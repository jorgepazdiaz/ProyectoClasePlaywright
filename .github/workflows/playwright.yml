name: Playwright Cucumber Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      tags:
        description: "Tags de Cucumber a ejecutar (ej: @formulario o @regresion)"
        required: false
        default: "@formulario"

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      TAGS: ${{ github.event.inputs.tags || '@formulario' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 🔥 LIMPIAR REPORTES (CLAVE)
      - name: Clean reports
        run: rm -rf reports

      # 🔥 EJECUCIÓN POR TAG
      - name: Run Cucumber tests
        run: npx cucumber-js --config cucumber.js --tags "${TAGS}"

      # 🔥 GENERAR REPORTE
      - name: Generate HTML report
        run: node generate-report.js

      # 🔍 DEBUG (opcional)
      - name: Verify report folder
        run: ls -la reports/html-report

      # 📦 GUARDAR ARTIFACT
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cucumber-report
          path: reports/html-report/
          retention-days: 30

      # 🚀 DEPLOY A GITHUB PAGES
      - name: Deploy report to GitHub Pages
        if: ${{ !cancelled() }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/html-report   # 🔥 sin ./
          publish_branch: gh-pages
          force_orphan: true
          keep_files: false
          enable_jekyll: false
          commit_message: "deploy report run ${{ github.run_id }}" # 🔥 evita cache
      
      - name: Fix report paths for GitHub Pages
        run: |
                find reports/html-report -type f -name "*.html" -exec sed -i 's|href="/|href="./|g' {} +
                find reports/html-report -type f -name "*.html" -exec sed -i 's|src="/|src="./|g' {} +