name: Playwright Cucumber Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  # 🔥 EJECUCIÓN MANUAL CON TAGS
  workflow_dispatch:
    inputs:
      tags:
        description: "Tags de Cucumber a ejecutar (ej: @formulario o @smoke)"
        required: false
        default: "@smoke"

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      # 🔥 Si no mandas tags usa default
      TAGS: ${{ github.event.inputs.tags || '@smoke' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 🔥 EJECUCIÓN DINÁMICA POR TAG
      - name: Run Cucumber tests
        run: npx cucumber-js --config cucumber.js --tags "${TAGS}"

      - name: Generate HTML report
        run: node generate-report.js

      # 🔍 DEBUG
      - name: Verify report folder
        run: ls -la reports/html-report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cucumber-report
          path: reports/html-report/
          retention-days: 30

      # 🚀 DEPLOY A GITHUB PAGES (FIX DEFINITIVO)
      - name: Deploy report to GitHub Pages
        if: ${{ !cancelled() }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports/html-report
          publish_branch: gh-pages
          force_orphan: true   # 🔥 CLAVE PARA EVITAR 404